<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Gifts – Sree Collections Kurnool</title>
<meta name="description" content="Shop premium gifts online at Sree Collections, Kurnool. Birthday, wedding, anniversary gifts with easy online ordering.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
:root{--gold:#C8A96B;--gold-light:#E8C98B;--dark:#0F0F0F;--charcoal:#1A1A1A;--card-bg:#1F1F1F;--text:#F5F0E8;--muted:#999;--border:rgba(200,169,107,0.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Manrope',sans-serif}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;background:rgba(15,15,15,0.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--gold);text-decoration:none}
.nav-back{color:var(--muted);text-decoration:none;font-size:0.85rem;display:flex;align-items:center;gap:0.4rem;transition:color 0.3s}
.nav-back:hover{color:var(--gold)}
.page-header{padding:7rem 2rem 3rem;text-align:center;background:var(--charcoal);border-bottom:1px solid var(--border)}
.page-header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:700;color:var(--gold)}
.page-header p{color:var(--muted);margin-top:0.5rem}
.filter-bar{padding:1.5rem 2rem;background:var(--charcoal);border-bottom:1px solid var(--border);display:flex;gap:0.8rem;flex-wrap:wrap;justify-content:center}
.filter-btn{padding:0.5rem 1.2rem;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.8rem;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;transition:all 0.3s;font-family:'Manrope',sans-serif}
.filter-btn.active,.filter-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(200,169,107,0.08)}
.products-section{padding:3rem 2rem;max-width:1200px;margin:0 auto}
.loading{text-align:center;padding:4rem;color:var(--muted)}
.loading i{font-size:2rem;color:var(--gold);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
.product-card{background:var(--card-bg);border:1px solid var(--border);transition:all 0.3s;overflow:hidden}
.product-card:hover{border-color:var(--gold);transform:translateY(-3px)}
.product-img{width:100%;height:200px;object-fit:cover;background:var(--charcoal);display:block}
.product-img-placeholder{width:100%;height:200px;background:linear-gradient(135deg,#1F1F1F,#2A2A2A);display:flex;align-items:center;justify-content:center;font-size:3rem}
.product-body{padding:1.5rem}
.product-category{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem}
.product-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;margin-bottom:0.5rem}
.product-desc{font-size:0.82rem;color:var(--muted);line-height:1.6;margin-bottom:1.2rem}
.product-price{font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:1rem}
.product-price span{font-size:0.75rem;font-weight:400;color:var(--muted)}
.btn-buy{width:100%;padding:0.8rem;background:var(--gold);color:var(--dark);border:none;font-size:0.85rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;transition:background 0.3s;font-family:'Manrope',sans-serif}
.btn-buy:hover{background:var(--gold-light)}
.no-products{text-align:center;padding:4rem;color:var(--muted)}

/* ORDER MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.active{display:flex}
.modal{background:var(--charcoal);border:1px solid var(--border);padding:2.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--gold);margin-bottom:1.5rem}
.modal-product{background:var(--card-bg);border:1px solid var(--border);padding:1rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center}
.modal-product-name{font-weight:600;font-size:0.95rem}
.modal-product-price{font-size:1.2rem;font-weight:700;color:var(--gold)}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:0.75rem;background:var(--dark);border:1px solid var(--border);color:var(--text);font-size:0.9rem;font-family:'Manrope',sans-serif;transition:border-color 0.3s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--gold)}
.qty-control{display:flex;align-items:center;gap:1rem}
.qty-btn{width:36px;height:36px;background:var(--dark);border:1px solid var(--border);color:var(--text);font-size:1.1rem;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{border-color:var(--gold);color:var(--gold)}
.qty-val{font-size:1.1rem;font-weight:700;min-width:30px;text-align:center}
.payment-methods{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:1.5rem}
.payment-method{padding:1rem;border:1px solid var(--border);cursor:pointer;transition:all 0.3s;text-align:center}
.payment-method.selected{border-color:var(--gold);background:rgba(200,169,107,0.08)}
.payment-method i{font-size:1.5rem;color:var(--gold);display:block;margin-bottom:0.4rem}
.payment-method span{font-size:0.8rem;color:var(--muted);font-weight:500}
.modal-total{background:var(--dark);border:1px solid var(--border);padding:1rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center}
.modal-total span{color:var(--muted);font-size:0.9rem}
.modal-total strong{font-size:1.3rem;color:var(--gold)}
.modal-btns{display:flex;gap:0.8rem}
.btn-confirm{flex:1;padding:0.9rem;background:var(--gold);color:var(--dark);border:none;font-size:0.9rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;font-family:'Manrope',sans-serif;transition:background 0.3s}
.btn-confirm:hover{background:var(--gold-light)}
.btn-cancel{padding:0.9rem 1.5rem;background:transparent;color:var(--muted);border:1px solid var(--border);font-size:0.9rem;cursor:pointer;font-family:'Manrope',sans-serif;transition:all 0.3s}
.btn-cancel:hover{border-color:var(--muted);color:var(--text)}

/* SUCCESS */
.success-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;align-items:center;justify-content:center}
.success-overlay.active{display:flex}
.success-box{background:var(--charcoal);border:1px solid rgba(200,169,107,0.4);padding:3rem;text-align:center;max-width:420px;width:90%}
.success-icon{font-size:4rem;margin-bottom:1rem}
.success-box h2{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--gold);margin-bottom:0.8rem}
.success-box p{color:var(--muted);font-size:0.9rem;line-height:1.6;margin-bottom:0.5rem}
.success-box .order-id{font-size:0.8rem;color:rgba(200,169,107,0.6);margin-top:1rem;margin-bottom:1.5rem}
.btn-done{padding:0.9rem 2rem;background:var(--gold);color:var(--dark);border:none;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif}

@media(max-width:600px){
  .payment-methods{grid-template-columns:1fr}
  .modal{padding:1.5rem}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Sree Collections</a>
  <div style="display:flex;align-items:center;gap:1.5rem">
    <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> Home</a>
    <a href="admin-login.html" class="nav-back" style="font-size:0.78rem;color:rgba(200,169,107,0.5)"><i class="fas fa-lock"></i> Admin</a>
  </div>
</nav>

<div class="page-header">
  <h1 id="pageTitle">Our Gift Collections</h1>
  <p>Premium gifts for every occasion · Order online · Pay securely</p>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="filterProducts('All')">All</button>
  <button class="filter-btn" onclick="filterProducts('Birthday')">🎂 Birthday</button>
  <button class="filter-btn" onclick="filterProducts('Wedding')">💍 Wedding</button>
  <button class="filter-btn" onclick="filterProducts('Anniversary')">❤️ Anniversary</button>
  <button class="filter-btn" onclick="filterProducts('Corporate')">💼 Corporate</button>
  <button class="filter-btn" onclick="filterProducts('Festivals')">🪔 Festivals</button>
  <button class="filter-btn" onclick="filterProducts('Baby Shower')">👶 Baby Shower</button>
  <button class="filter-btn" onclick="filterProducts('Retirement')">🏆 Retirement</button>
</div>

<div class="products-section">
  <div class="loading" id="loading"><i class="fas fa-spinner"></i><br><br>Loading products...</div>
  <div class="products-grid" id="productsGrid"></div>
  <div class="no-products" id="noProducts" style="display:none">
    <i class="fas fa-box-open" style="font-size:3rem;color:var(--gold);display:block;margin-bottom:1rem"></i>
    No products found in this category yet.<br>
    <a href="https://wa.me/917207186844" target="_blank" style="color:var(--gold)">Contact us on WhatsApp</a> to enquire.
  </div>
</div>

<!-- ORDER MODAL -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <h2>Place Order</h2>
    <div class="modal-product">
      <div>
        <div class="modal-product-name" id="modalProductName"></div>
        <div style="font-size:0.8rem;color:var(--muted)" id="modalProductCategory"></div>
      </div>
      <div class="modal-product-price" id="modalProductPrice"></div>
    </div>
    <div class="form-group">
      <label>Your Name *</label>
      <input type="text" id="custName" placeholder="Enter your full name">
    </div>
    <div class="form-group">
      <label>Phone Number *</label>
      <input type="tel" id="custPhone" placeholder="+91 XXXXX XXXXX">
    </div>
    <div class="form-group">
      <label>Delivery Address</label>
      <textarea id="custAddress" rows="2" placeholder="Enter address (optional – for delivery)"></textarea>
    </div>
    <div class="form-group">
      <label>Quantity</label>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <span class="qty-val" id="qtyVal">1</span>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>
    <div class="form-group">
      <label>Payment Method</label>
      <div class="payment-methods">
        <div class="payment-method selected" id="pm-cod" onclick="selectPayment('cod')">
          <i class="fas fa-money-bill-wave"></i>
          <span>Cash on Delivery</span>
        </div>
        <div class="payment-method" id="pm-online" onclick="selectPayment('online')">
          <i class="fas fa-credit-card"></i>
          <span>Pay Online</span>
        </div>
      </div>
    </div>
    <div class="modal-total">
      <span>Total Amount</span>
      <strong id="modalTotal">₹0</strong>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="confirmBtn" onclick="confirmOrder()">
        <i class="fas fa-shopping-bag"></i> Confirm Order
      </button>
    </div>
  </div>
</div>

<!-- SUCCESS -->
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="success-icon" id="successIcon">✅</div>
    <h2 id="successTitle">Order Placed!</h2>
    <p id="successMsg"></p>
    <div class="order-id" id="successOrderId"></div>
    <button class="btn-done" onclick="document.getElementById('successOverlay').classList.remove('active')">Continue Shopping</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://peqqtfvypljvgcorddbn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlcXF0ZnZ5cGxqdmdjb3JkZGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNDU1OTAsImV4cCI6MjA5NDgyMTU5MH0.J364P7n9HazV0F8Bd9o_OKBsfKbfLAbW1vCRjIflLtE';
const RZP_KEY = 'rzp_test_SrsY668SBTZFfn';

let allProducts = [];
let currentProduct = null;
let currentQty = 1;
let currentPayment = 'cod';

async function sbFetch(method, table, body, filter) {
  let url = `${SUPABASE_URL}/rest/v1/${table}`;
  if (filter) url += `?${filter}`;
  try {
    const res = await fetch(url, {
      method,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': method === 'POST' ? 'return=representation' : ''
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) {
      const err = await res.text();
      console.error('Supabase error:', res.status, err);
      return null;
    }
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  } catch(e) {
    console.error('Fetch error:', e);
    return null;
  }
}

async function loadProducts() {
  const grid = document.getElementById('productsGrid');
  const loading = document.getElementById('loading');
  
  const products = await sbFetch('GET', 'products', null, 'in_stock=eq.true&order=created_at.desc');
  loading.style.display = 'none';
  
  if (!products) {
    document.getElementById('noProducts').innerHTML = '<i class="fas fa-exclamation-circle" style="font-size:2rem;color:#e74c3c;display:block;margin-bottom:1rem"></i>Could not load products. Please check your internet connection and try again.<br><br><button onclick="location.reload()" style="background:var(--gold);color:var(--dark);border:none;padding:0.6rem 1.5rem;cursor:pointer;font-family:Manrope,sans-serif;font-weight:700">Retry</button>';
    document.getElementById('noProducts').style.display = 'block';
    return;
  }
  
  if (products.length === 0) {
    document.getElementById('noProducts').style.display = 'block';
    return;
  }
  
  allProducts = products;
  
  // Check URL for category filter
  const urlParams = new URLSearchParams(window.location.search);
  const cat = urlParams.get('category');
  if (cat) {
    document.getElementById('pageTitle').textContent = cat + ' Gifts';
    filterProducts(cat);
    // Highlight active filter
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.remove('active');
      if (btn.textContent.includes(cat)) btn.classList.add('active');
    });
  } else {
    renderProducts(products);
  }
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  const noP = document.getElementById('noProducts');
  
  if (!products || products.length === 0) {
    grid.innerHTML = '';
    noP.style.display = 'block';
    return;
  }
  noP.style.display = 'none';
  
  grid.innerHTML = products.map(p => `
    <div class="product-card">
      ${p.image_url 
        ? `<img src="${p.image_url}" alt="${p.name}" class="product-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="product-img-placeholder" style="${p.image_url ? 'display:none' : ''}">🎁</div>
      <div class="product-body">
        <div class="product-category">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.description || ''}</div>
        <div class="product-price">₹${Number(p.price).toLocaleString('en-IN')} <span>incl. taxes</span></div>
        <button class="btn-buy" onclick='openOrder(${JSON.stringify(p).replace(/'/g,"&#39;")})'>
          <i class="fas fa-shopping-bag"></i> Buy Now
        </button>
      </div>
    </div>
  `).join('');
}

function filterProducts(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event && event.target && event.target.classList.add('active');
  
  if (cat === 'All') {
    renderProducts(allProducts);
  } else {
    renderProducts(allProducts.filter(p => p.category === cat));
  }
}

function openOrder(product) {
  currentProduct = product;
  currentQty = 1;
  currentPayment = 'cod';
  document.getElementById('modalProductName').textContent = product.name;
  document.getElementById('modalProductCategory').textContent = product.category;
  document.getElementById('modalProductPrice').textContent = '₹' + Number(product.price).toLocaleString('en-IN');
  document.getElementById('qtyVal').textContent = 1;
  updateTotal();
  document.getElementById('pm-cod').classList.add('selected');
  document.getElementById('pm-online').classList.remove('selected');
  document.getElementById('orderModal').classList.add('active');
}

function closeModal() {
  document.getElementById('orderModal').classList.remove('active');
  currentProduct = null;
}

function changeQty(d) {
  currentQty = Math.max(1, currentQty + d);
  document.getElementById('qtyVal').textContent = currentQty;
  updateTotal();
}

function updateTotal() {
  if (!currentProduct) return;
  const total = Number(currentProduct.price) * currentQty;
  document.getElementById('modalTotal').textContent = '₹' + total.toLocaleString('en-IN');
}

function selectPayment(method) {
  currentPayment = method;
  document.getElementById('pm-cod').classList.toggle('selected', method === 'cod');
  document.getElementById('pm-online').classList.toggle('selected', method === 'online');
}

async function confirmOrder() {
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  if (!name || !phone) { alert('Please enter your name and phone number.'); return; }
  
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
  
  if (currentPayment === 'cod') {
    await placeOrder(name, phone, 'cod', 'pending', null);
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-shopping-bag"></i> Confirm Order';
  } else {
    await startRazorpay(name, phone);
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-shopping-bag"></i> Confirm Order';
  }
}

async function startRazorpay(name, phone) {
  const total = Number(currentProduct.price) * currentQty;
  
  const options = {
    key: RZP_KEY,
    amount: total * 100,
    currency: 'INR',
    name: 'Sree Collections',
    description: currentProduct.name,
    image: 'https://sreecollectionsknl.netlify.app/icon.png',
    prefill: { name, contact: phone },
    theme: { color: '#C8A96B' },
    handler: async function(response) {
      await placeOrder(name, phone, 'online', 'paid', response.razorpay_payment_id);
    },
    modal: {
      ondismiss: function() {
        showResult(false, 'Payment Cancelled', 'You closed the payment window. No charges were made. Try again or choose Cash on Delivery.', null);
      }
    }
  };
  
  try {
    const rzp = new Razorpay(options);
    rzp.on('payment.failed', function(res) {
      showResult(false, 'Payment Failed', 'Your payment could not be processed. Please try again or use Cash on Delivery.', null);
    });
    closeModal();
    rzp.open();
  } catch(e) {
    showResult(false, 'Payment Error', 'Could not open payment gateway. Please try Cash on Delivery.', null);
  }
}

async function placeOrder(name, phone, method, payStatus, payId) {
  const address = document.getElementById('custAddress').value.trim();
  const total = Number(currentProduct.price) * currentQty;
  
  const orderData = {
    customer_name: name,
    customer_phone: phone,
    customer_address: address || null,
    product_id: currentProduct.id,
    product_name: currentProduct.name,
    product_price: currentProduct.price,
    quantity: currentQty,
    payment_method: method,
    payment_status: payStatus,
    razorpay_payment_id: payId || null,
    status: 'placed'
  };
  
  const result = await sbFetch('POST', 'orders', orderData);
  closeModal();
  
  if (method === 'cod') {
    showResult(true, 'Order Placed! 🎉', 
      `Thank you ${name}! Your order for "${currentProduct.name}" (Qty: ${currentQty}) worth ₹${total.toLocaleString('en-IN')} has been placed. Pay ₹${total.toLocaleString('en-IN')} when you receive it. We'll contact you at ${phone} to confirm.`,
      result && result[0] ? result[0].id : null
    );
  } else {
    showResult(true, 'Payment Successful! ✅',
      `Thank you ${name}! Your payment of ₹${total.toLocaleString('en-IN')} was successful. Order for "${currentProduct.name}" has been confirmed. We'll contact you at ${phone} shortly.`,
      result && result[0] ? result[0].id : null
    );
  }
}

function showResult(success, title, msg, orderId) {
  document.getElementById('successIcon').textContent = success ? '✅' : '❌';
  document.getElementById('successTitle').textContent = title;
  document.getElementById('successMsg').textContent = msg;
  document.getElementById('successOrderId').textContent = orderId ? `Order ID: ${orderId.substring(0,8).toUpperCase()}` : '';
  document.getElementById('successOverlay').classList.add('active');
}

loadProducts();
</script>
</body>
</html>
