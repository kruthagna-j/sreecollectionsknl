<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard – Sree Collections</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--gold:#C8A96B;--gold-light:#E8C98B;--dark:#0F0F0F;--charcoal:#1A1A1A;--card-bg:#1F1F1F;--text:#F5F0E8;--muted:#999;--border:rgba(200,169,107,0.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Manrope',sans-serif}
.header{background:var(--charcoal);border-bottom:1px solid var(--border);padding:1.2rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--gold)}
.header-actions{display:flex;gap:1rem;align-items:center}
.btn{padding:0.6rem 1.2rem;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.8rem;cursor:pointer;transition:all 0.3s;text-decoration:none;display:inline-flex;align-items:center;gap:0.5rem;font-family:'Manrope',sans-serif}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-logout{border-color:#e74c3c;color:#e74c3c}
.btn-logout:hover{background:#e74c3c;color:white}
.container{max-width:1400px;margin:0 auto;padding:2rem}
.tabs{display:flex;gap:0.5rem;margin-bottom:2rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tab{padding:0.8rem 1.5rem;background:transparent;border:none;color:var(--muted);font-size:0.85rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.3s;font-family:'Manrope',sans-serif;letter-spacing:0.03em}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover{color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;margin-bottom:2rem}
.stat-card{background:var(--card-bg);border:1px solid var(--border);padding:1.5rem}
.stat-label{font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--gold)}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700}
.btn-primary{background:var(--gold);color:var(--dark);padding:0.7rem 1.5rem;border:none;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;transition:background 0.3s}
.btn-primary:hover{background:var(--gold-light)}
.btn-danger{background:#e74c3c;color:white;padding:0.7rem 1.5rem;border:none;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;transition:opacity 0.3s}
.btn-danger:hover{opacity:0.9}
.table-container{background:var(--card-bg);border:1px solid var(--border);overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--charcoal);padding:1rem;text-align:left;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:1rem;border-bottom:1px solid var(--border);font-size:0.9rem}
tr:last-child td{border-bottom:none}
tr:hover{background:rgba(200,169,107,0.03)}
.badge{display:inline-block;padding:0.3rem 0.8rem;font-size:0.75rem;font-weight:600;border-radius:2px;letter-spacing:0.05em}
.badge-success{background:rgba(39,174,96,0.2);color:#27ae60;border:1px solid rgba(39,174,96,0.3)}
.badge-pending{background:rgba(241,196,15,0.2);color:#f1c40f;border:1px solid rgba(241,196,15,0.3)}
.badge-cod{background:rgba(52,152,219,0.2);color:#3498db;border:1px solid rgba(52,152,219,0.3)}
.badge-online{background:rgba(155,89,182,0.2);color:#9b59b6;border:1px solid rgba(155,89,182,0.3)}
.action-btns{display:flex;gap:0.5rem}
.btn-small{padding:0.4rem 0.8rem;font-size:0.75rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.3s}
.btn-small:hover{border-color:var(--gold);color:var(--gold)}
.btn-delete{border-color:#e74c3c;color:#e74c3c}
.btn-delete:hover{background:#e74c3c;color:white}
.form-group{margin-bottom:1.5rem}
.form-group label{display:block;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:0.8rem;background:var(--dark);border:1px solid var(--border);color:var(--text);font-size:0.9rem;font-family:'Manrope',sans-serif}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal.active{display:flex}
.modal-content{background:var(--charcoal);border:1px solid var(--border);padding:2.5rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--gold)}
.btn-close{background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer}
.btn-close:hover{color:var(--text)}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-state i{font-size:3rem;color:var(--gold);display:block;margin-bottom:1rem}
@media(max-width:768px){
.header{flex-direction:column;align-items:flex-start}
.form-row{grid-template-columns:1fr}
.table-container{font-size:0.85rem}
td,th{padding:0.7rem}
}
</style>
</head>
<body>

<div class="header">
<div class="logo">Sree Collections Admin</div>
<div class="header-actions">
<a href="index.html" class="btn" target="_blank"><i class="fas fa-store"></i> Visit Store</a>
<button class="btn btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>
</div>

<div class="container">
<div class="stats-grid">
<div class="stat-card"><div class="stat-label">Total Products</div><div class="stat-value" id="statProducts">0</div></div>
<div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value" id="statOrders">0</div></div>
<div class="stat-card"><div class="stat-label">Pending Orders</div><div class="stat-value" id="statPending">0</div></div>
<div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-value" id="statRevenue">₹0</div></div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('products')">Products</button>
<button class="tab" onclick="switchTab('orders')">Orders</button>
</div>

<!-- PRODUCTS TAB -->
<div class="tab-content active" id="tab-products">
<div class="section-header">
<h2 class="section-title">Products</h2>
<button class="btn-primary" onclick="openProductModal()"><i class="fas fa-plus"></i> Add Product</button>
</div>
<div class="table-container">
<table id="productsTable">
<thead>
<tr>
<th>Name</th>
<th>Category</th>
<th>Price</th>
<th>Stock</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="productsBody"></tbody>
</table>
</div>
</div>

<!-- ORDERS TAB -->
<div class="tab-content" id="tab-orders">
<div class="section-header">
<h2 class="section-title">Orders</h2>
<button class="btn-danger" onclick="clearAllOrders()"><i class="fas fa-trash"></i> Clear All Orders</button>
</div>
<div class="table-container">
<table id="ordersTable">
<thead>
<tr>
<th>Order ID</th>
<th>Customer</th>
<th>Product</th>
<th>Qty</th>
<th>Amount</th>
<th>Payment</th>
<th>Status</th>
<th>Cancelled By</th>
<th>Date</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="ordersBody"></tbody>
</table>
</div>
</div>

</div>

<!-- PRODUCT MODAL -->
<div class="modal" id="productModal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title" id="productModalTitle">Add Product</h3>
<button class="btn-close" onclick="closeProductModal()">&times;</button>
</div>
<form id="productForm">
<div class="form-group">
<label>Product Name *</label>
<input type="text" id="prodName" required>
</div>
<div class="form-row">
<div class="form-group">
<label>Category *</label>
<select id="prodCategory" required>
<option value="">Select Category</option>
<option value="Birthday">Birthday</option>
<option value="Wedding">Wedding</option>
<option value="Anniversary">Anniversary</option>
<option value="Corporate">Corporate</option>
<option value="Festivals">Festivals</option>
<option value="Baby Shower">Baby Shower</option>
<option value="Retirement">Retirement</option>
</select>
</div>
<div class="form-group">
<label>Price (₹) *</label>
<input type="number" id="prodPrice" required>
</div>
</div>
<div class="form-group">
<label>Description</label>
<textarea id="prodDesc" rows="3"></textarea>
</div>
<div class="form-group">
<label>Image URL</label>
<input type="url" id="prodImage" placeholder="https://...">
</div>
<div class="form-group">
<label>In Stock</label>
<select id="prodStock">
<option value="true">Yes</option>
<option value="false">No</option>
</select>
</div>
<div style="display:flex;gap:1rem;margin-top:2rem">
<button type="button" class="btn" onclick="closeProductModal()">Cancel</button>
<button type="submit" class="btn-primary" style="flex:1">Save Product</button>
</div>
</form>
</div>
</div>

<script>
const SUPABASE_URL = 'https://peqqtfvypljvgcorddbn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlcXF0ZnZ5cGxqdmdjb3JkZGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNDU1OTAsImV4cCI6MjA5NDgyMTU5MH0.J364P7n9HazV0F8Bd9o_OKBsfKbfLAbW1vCRjIflLtE';

let currentEditId = null;

// Check auth on page load
if (sessionStorage.getItem('adminAuth') !== 'true') {
  window.location.href = 'admin-login.html';
}

function logout() {
  if (confirm('Are you sure you want to logout?')) {
    sessionStorage.removeItem('adminAuth');
    sessionStorage.removeItem('adminAuthTime');
    window.location.href = 'admin-login.html';
  }
}

async function sbFetch(method, table, body, filter) {
  let url = `${SUPABASE_URL}/rest/v1/${table}`;
  if (filter) url += `?${filter}`;
  try {
    const res = await fetch(url, {
      method,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': method === 'POST' ? 'return=representation' : ''
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  } catch(e) {
    console.error('Supabase error:', e);
    alert('Database error: ' + e.message);
    return null;
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'products') loadProducts();
  if (tab === 'orders') loadOrders();
}

async function loadStats() {
  const products = await sbFetch('GET', 'products');
  const orders = await sbFetch('GET', 'orders');
  
  document.getElementById('statProducts').textContent = products ? products.length : 0;
  document.getElementById('statOrders').textContent = orders ? orders.length : 0;
  
  if (orders) {
    const pending = orders.filter(o => o.status === 'placed').length;
    document.getElementById('statPending').textContent = pending;
    
    const revenue = orders.reduce((sum, o) => sum + (Number(o.product_price) * Number(o.quantity)), 0);
    document.getElementById('statRevenue').textContent = '₹' + revenue.toLocaleString('en-IN');
  }
}

async function loadProducts() {
  const products = await sbFetch('GET', 'products', null, 'order=created_at.desc');
  const tbody = document.getElementById('productsBody');
  
  if (!products || products.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><i class="fas fa-box-open"></i><p>No products yet. Add your first product!</p></div></td></tr>';
    return;
  }
  
  tbody.innerHTML = products.map(p => `
    <tr>
      <td><strong>${p.name}</strong></td>
      <td>${p.category}</td>
      <td>₹${Number(p.price).toLocaleString('en-IN')}</td>
      <td><span class="badge ${p.in_stock ? 'badge-success' : 'badge-pending'}">${p.in_stock ? 'In Stock' : 'Out of Stock'}</span></td>
      <td>
        <div class="action-btns">
<button class="btn-small" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button>
          <button class="btn-small btn-delete" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function loadOrders() {
  const orders = await sbFetch('GET', 'orders', null, 'order=created_at.desc');
  const tbody = document.getElementById('ordersBody');
  
  if (!orders || orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><i class="fas fa-receipt"></i><p>No orders yet.</p></div></td></tr>';
    return;
  }
  
  tbody.innerHTML = orders.map(o => `
    <tr>
      <td><strong>#${o.id.toString().substring(0,8)}</strong></td>
      <td>${o.customer_name}<br><small style="color:var(--muted)">${o.customer_phone}</small></td>
      <td>${o.product_name}</td>
      <td>${o.quantity}</td>
      <td>₹${(Number(o.product_price) * Number(o.quantity)).toLocaleString('en-IN')}</td>
      <td><span class="badge ${o.payment_method === 'cod' ? 'badge-cod' : 'badge-online'}">${o.payment_method === 'cod' ? 'COD' : 'Online'}</span></td>
      <td>
        <select onchange="updateOrderStatus('${o.id}', this.value)" style="background:var(--dark);border:1px solid var(--border);color:var(--text);padding:0.3rem;font-family:'Manrope',sans-serif;font-size:0.8rem">
          <option value="placed" ${o.status === 'placed' ? 'selected' : ''}>Placed</option>
          <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>Processing</option>
          <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Delivered</option>
          <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
        </select>
      </td>
      <td>
        ${o.status === 'cancelled' ? `<span class="badge badge-pending" style="background:rgba(231,76,60,0.2);color:#e74c3c">${o.cancelled_by === 'customer' ? '👤 Customer' : o.cancelled_by === 'admin' ? '🔑 Admin' : o.cancelled_by || 'admin'}</span>` : '<span style="color:var(--muted)">-</span>'}
      </td>
      <td>${new Date(o.created_at).toLocaleDateString('en-IN')}</td>
      <td>
        <button class="btn-small btn-delete" onclick="deleteOrder('${o.id}')"><i class="fas fa-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

function openProductModal(id = null) {
  currentEditId = id;
  document.getElementById('productModalTitle').textContent = id ? 'Edit Product' : 'Add Product';
  document.getElementById('productForm').reset();
  
  if (id) {
    sbFetch('GET', 'products', null, `id=eq.${id}`).then(data => {
      if (data && data[0]) {
        const p = data[0];
        document.getElementById('prodName').value = p.name;
        document.getElementById('prodCategory').value = p.category;
        document.getElementById('prodPrice').value = p.price;
        document.getElementById('prodDesc').value = p.description || '';
        document.getElementById('prodImage').value = p.image_url || '';
        document.getElementById('prodStock').value = p.in_stock.toString();
      }
    });
  }
  
  document.getElementById('productModal').classList.add('active');
}

function closeProductModal() {
  document.getElementById('productModal').classList.remove('active');
  currentEditId = null;
}

document.getElementById('productForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const data = {
    name: document.getElementById('prodName').value.trim(),
    category: document.getElementById('prodCategory').value,
    price: Number(document.getElementById('prodPrice').value),
    description: document.getElementById('prodDesc').value.trim() || null,
    image_url: document.getElementById('prodImage').value.trim() || null,
    in_stock: document.getElementById('prodStock').value === 'true'
  };
  
  if (currentEditId) {
    await sbFetch('PATCH', 'products', data, `id=eq.${currentEditId}`);
  } else {
    await sbFetch('POST', 'products', data);
  }
  
  closeProductModal();
  loadProducts();
  loadStats();
});

async function editProduct(id) {
  openProductModal(id);
}

async function deleteProduct(id) {
  if (!confirm('Delete this product permanently?')) return;
  await sbFetch('DELETE', 'products', null, `id=eq.${id}`);
  loadProducts();
  loadStats();
}

async function deleteOrder(id) {
  if (!confirm('Delete this order?')) return;
  await sbFetch('DELETE', 'orders', null, `id=eq.${id}`);
  loadOrders();
  loadStats();
}

async function clearAllOrders() {
  if (!confirm('⚠️ DELETE ALL ORDERS? This cannot be undone!')) return;
  if (!confirm('Are you absolutely sure? This will permanently delete ALL order history.')) return;
  
  const orders = await sbFetch('GET', 'orders');
  if (!orders || orders.length === 0) {
    alert('No orders to delete.');
    return;
  }
  
  // Delete all orders one by one
  for (const order of orders) {
    await sbFetch('DELETE', 'orders', null, `id=eq.${order.id}`);
  }
  
  alert(`✓ Deleted ${orders.length} orders successfully.`);
  loadOrders();
  loadStats();
}

async function updateOrderStatus(id, status) {
  const updateData = { status };
  if (status === 'cancelled') {
    updateData.cancelled_by = 'admin';
  }
  await sbFetch('PATCH', 'orders', updateData, `id=eq.${id}`);
  loadStats();
  
  // Get order details to send email
  const orders = await sbFetch('GET', 'orders', null, `id=eq.${id}`);
  if (!orders || !orders[0]) return;
  const o = orders[0];
  if (!o.customer_email) return;
  
  const statusMessages = {
  processing: 'Order Processing 🔄',
  delivered: 'Order Delivered ✅',
  cancelled: 'Order Cancelled ❌',
  placed: 'Order Confirmed ✅'
};  
  
  try {
    await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        service_id: 'service_fxctnxu',
        template_id: 'template_detul3i',
        user_id: '9fGahlws55ZA4Hq9S',
        template_params: {
          customer_email: o.customer_email,
          customer_name: o.customer_name,
          customer_phone: o.customer_phone,
          order_id: o.id.toString().substring(0,8).toUpperCase(),
          product_name: o.product_name,
          quantity: o.quantity,
          total_amount: '₹' + (Number(o.product_price) * Number(o.quantity)).toLocaleString('en-IN'),
          payment_method: statusMessages[status] || 'Order status updated.'
        }
      })
    });
  } catch(e) {
    console.error('Email error:', e);
    alert('Email error: ' + JSON.stringify(e));
  }
}

// Initial load
loadStats();
loadProducts();
</script>

</body>
</html>
