<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – Sree Collections</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C8A96B;--gold-light:#E8C98B;--dark:#0F0F0F;--charcoal:#1A1A1A;--text:#F5F0E8;--muted:#999;--border:rgba(200,169,107,0.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:var(--charcoal);border:1px solid var(--border);padding:3rem 2.5rem;width:100%;max-width:400px;text-align:center}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--gold);margin-bottom:0.5rem}
.subtitle{font-size:0.85rem;color:var(--muted);margin-bottom:2rem}
.form-group{margin-bottom:1.2rem;text-align:left}
.form-group label{display:block;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
.form-group input{width:100%;padding:0.85rem 1rem;background:var(--dark);border:1px solid var(--border);color:var(--text);font-family:'Manrope',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.3s}
.form-group input:focus{border-color:var(--gold)}
.btn{width:100%;padding:0.9rem;background:var(--gold);color:var(--dark);border:none;font-size:0.9rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;font-family:'Manrope',sans-serif;transition:background 0.3s;margin-top:0.5rem}
.btn:hover{background:var(--gold-light)}
.error{color:#e74c3c;font-size:0.82rem;margin-top:0.8rem;min-height:20px;text-align:center}
.attempts{font-size:0.78rem;color:var(--muted);margin-top:0.5rem;text-align:center}
.back{display:inline-block;margin-top:1.5rem;color:var(--muted);text-decoration:none;font-size:0.82rem;transition:color 0.3s}
.back:hover{color:var(--gold)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Sree Collections</div>
  <div class="subtitle">Admin Access Only</div>
  <div class="form-group">
    <label>Admin Password</label>
    <input type="password" id="adminPass" placeholder="Enter admin password" maxlength="100" autocomplete="current-password">
  </div>
  <button class="btn" onclick="doLogin()">Login to Admin</button>
  <div class="error" id="errMsg"></div>
  <div class="attempts" id="attemptsMsg"></div>
  <a href="index.html" class="back">← Back to Store</a>
</div>

<script>
/* FIX: brute-force protection on admin login */
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 15 * 60 * 1000; // 15 minutes
const SESSION_EXPIRY_MS = 60 * 60 * 1000; // 1 hour

/* Admin password — SHA-256 hash of 'SreeAdmin@2024'
   To change password: update ADMIN_HASH with new hash
   Generate hash: https://emn178.github.io/online-tools/sha256.html */
const ADMIN_HASH = '59f028710955edb82c628af1e35b73e813bc7db511218fde75c961b20f2abdcf';
// NOTE TO BUYER: Replace ADMIN_HASH with SHA-256 hash of your own password before deploying

function getAttempts() {
  try {
    const data = JSON.parse(localStorage.getItem('adminLoginAttempts') || '{"count":0,"time":0}');
    return data;
  } catch(e) { return {count:0, time:0}; }
}

function setAttempts(count, time) {
  localStorage.setItem('adminLoginAttempts', JSON.stringify({count, time}));
}

function checkLockout() {
  const data = getAttempts();
  if (data.count >= MAX_ATTEMPTS) {
    const elapsed = Date.now() - data.time;
    if (elapsed < LOCKOUT_MS) {
      const remaining = Math.ceil((LOCKOUT_MS - elapsed) / 60000);
      return `Too many failed attempts. Try again in ${remaining} minute(s).`;
    } else {
      setAttempts(0, 0);
      return null;
    }
  }
  return null;
}

async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin() {
  const errEl = document.getElementById('errMsg');
  const attEl = document.getElementById('attemptsMsg');
  errEl.textContent = '';
  attEl.textContent = '';

  const lockMsg = checkLockout();
  if (lockMsg) { errEl.textContent = lockMsg; return; }

  const pass = document.getElementById('adminPass').value;
  if (!pass) { errEl.textContent = 'Please enter the admin password.'; return; }

  const hash = await sha256(pass);

  if (hash === ADMIN_HASH) {
    /* Success — clear attempts, set session */
    setAttempts(0, 0);
    sessionStorage.setItem('adminAuth', 'true');
    sessionStorage.setItem('adminAuthTime', Date.now().toString());
    window.location.href = 'admin.html';
  } else {
    const data = getAttempts();
    const newCount = data.count + 1;
    setAttempts(newCount, Date.now());
    const remaining = MAX_ATTEMPTS - newCount;
    if (remaining > 0) {
      errEl.textContent = 'Incorrect password.';
      attEl.textContent = `${remaining} attempt(s) remaining before 15-minute lockout.`;
    } else {
      errEl.textContent = 'Too many failed attempts. Locked for 15 minutes.';
    }
    document.getElementById('adminPass').value = '';
  }
}

/* Enter key support */
document.getElementById('adminPass').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doLogin();
});

/* If already authenticated and session valid, skip login */
(function() {
  const auth = sessionStorage.getItem('adminAuth');
  const authTime = sessionStorage.getItem('adminAuthTime');
  if (auth === 'true' && authTime && Date.now() - Number(authTime) < SESSION_EXPIRY_MS) {
    window.location.href = 'admin.html';
  }
})();

/* Check lockout on page load */
const lockMsg = checkLockout();
if (lockMsg) {
  document.getElementById('errMsg').textContent = lockMsg;
  document.getElementById('adminPass').disabled = true;
  document.querySelector('.btn').disabled = true;
}
</script>
</body>
</html>
