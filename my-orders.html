<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders – Sree Collections</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--gold:#C8A96B;--gold-light:#E8C98B;--dark:#0F0F0F;--charcoal:#1A1A1A;--card-bg:#1F1F1F;--text:#F5F0E8;--muted:#999;--border:rgba(200,169,107,0.2)}
.light-mode{--gold:#9A6F2E;--dark:#f5f5f5;--charcoal:#fff;--card-bg:#fff;--text:#111;--muted:#555;--border:rgba(0,0,0,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Manrope',sans-serif}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;background:rgba(15,15,15,0.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--gold);text-decoration:none}
.nav-back{color:var(--muted);text-decoration:none;font-size:0.85rem;display:flex;align-items:center;gap:0.4rem}
.nav-back:hover{color:var(--gold)}
.container{max-width:800px;margin:0 auto;padding:7rem 1.5rem 4rem}
.page-title{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--gold);margin-bottom:0.5rem}
.search-box{display:flex;gap:0.5rem;margin-bottom:2rem;margin-top:1.5rem}
.search-box input{flex:1;padding:0.85rem 1rem;background:var(--card-bg);border:1px solid var(--border);color:var(--text);font-family:'Manrope',sans-serif;font-size:0.9rem}
.search-box input:focus{outline:none;border-color:var(--gold)}
.search-box button{padding:0.85rem 1.5rem;background:var(--gold);color:var(--dark);border:none;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;font-size:0.9rem;white-space:nowrap}
.search-box button:hover{background:var(--gold-light)}
.order-card{background:var(--card-bg);border:1px solid var(--border);margin-bottom:1.2rem;overflow:hidden}
.order-header{padding:1.2rem 1.5rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.5rem;border-bottom:1px solid var(--border)}
.order-id{font-size:0.8rem;color:var(--muted)}
.order-date{font-size:0.8rem;color:var(--muted)}
.order-body{padding:1.2rem 1.5rem}
.order-product{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem}
.order-product-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700}
.order-product-price{color:var(--gold);font-weight:700;font-size:1.1rem}
.tracking-bar{margin:1rem 0}
.tracking-steps{display:flex;justify-content:space-between;position:relative;margin-bottom:0.5rem}
.tracking-steps::before{content:'';position:absolute;top:14px;left:0;right:0;height:2px;background:var(--border);z-index:0}
.tracking-fill{position:absolute;top:14px;left:0;height:2px;background:var(--gold);z-index:1;transition:width 0.5s}
.step{display:flex;flex-direction:column;align-items:center;gap:0.4rem;z-index:2;flex:1}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--dark);display:flex;align-items:center;justify-content:center;font-size:0.7rem;transition:all 0.3s}
.step-dot.done{background:var(--gold);border-color:var(--gold);color:var(--dark)}
.step-dot.active{border-color:var(--gold);color:var(--gold)}
.step-label{font-size:0.65rem;color:var(--muted);text-align:center;max-width:60px;line-height:1.3}
.step-label.done,.step-label.active{color:var(--gold)}
.order-meta{display:flex;gap:1rem;flex-wrap:wrap;font-size:0.82rem;color:var(--muted);margin-top:0.8rem}
.order-actions{display:flex;gap:0.5rem;margin-top:1rem;flex-wrap:wrap}
.btn-action{padding:0.5rem 1rem;font-size:0.8rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Manrope',sans-serif;transition:all 0.3s}
.btn-action:hover{border-color:var(--gold);color:var(--gold)}
.btn-cancel{border-color:#e74c3c;color:#e74c3c}
.btn-cancel:hover{background:#e74c3c;color:white}
.btn-review{border-color:#27ae60;color:#27ae60}
.btn-review:hover{background:#27ae60;color:white}
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty i{font-size:3rem;color:var(--gold);display:block;margin-bottom:1rem}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
.modal-overlay.active{display:flex}
.modal{background:var(--charcoal);border:1px solid var(--border);padding:2rem;width:100%;max-width:480px;margin-top:4rem}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--gold);margin-bottom:1.5rem}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:0.75rem;background:var(--dark);border:1px solid var(--border);color:var(--text);font-family:'Manrope',sans-serif;font-size:0.9rem}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--gold)}
.stars-input{display:flex;gap:0.3rem;font-size:1.8rem;cursor:pointer;margin-bottom:0.5rem}
.stars-input span{color:var(--border);transition:color 0.2s}
.stars-input span.lit{color:var(--gold)}
.btn-submit{width:100%;padding:0.9rem;background:var(--gold);color:var(--dark);border:none;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;font-size:0.9rem;margin-top:0.5rem}
.btn-submit:hover{background:var(--gold-light)}
.btn-close-modal{float:right;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;line-height:1}
.badge{display:inline-block;padding:0.25rem 0.7rem;font-size:0.72rem;font-weight:600;border-radius:2px}
.badge-placed{background:rgba(241,196,15,0.15);color:#f1c40f;border:1px solid rgba(241,196,15,0.3)}
.badge-shipping{background:rgba(52,152,219,0.15);color:#3498db;border:1px solid rgba(52,152,219,0.3)}
.badge-shipped{background:rgba(155,89,182,0.15);color:#9b59b6;border:1px solid rgba(155,89,182,0.3)}
.badge-delivered{background:rgba(39,174,96,0.15);color:#27ae60;border:1px solid rgba(39,174,96,0.3)}
.badge-cancelled{background:rgba(231,76,60,0.15);color:#e74c3c;border:1px solid rgba(231,76,60,0.3)}
.return-badge{background:rgba(200,169,107,0.15);color:var(--gold);border:1px solid var(--border)}
@media(max-width:600px){.order-header{flex-direction:column}.tracking-steps{gap:0}.step-label{font-size:0.58rem;max-width:48px}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Sree Collections</a>
  <div style="display:flex;align-items:center;gap:1rem">
    <a href="collections.html" class="nav-back"><i class="fas fa-arrow-left"></i> Shop</a>
    <button onclick="toggleTheme()" id="themeBtn" style="background:none;border:1px solid var(--border);color:var(--gold);width:36px;height:36px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center">🌙</button>
  </div>
</nav>

<div class="container">
  <h1 class="page-title">My Orders</h1>
  <p style="color:var(--muted);font-size:0.88rem">Enter the phone number you used when ordering.</p>
  <div class="search-box">
    <input type="tel" id="phoneInput" placeholder="+91 XXXXX XXXXX" maxlength="15">
    <button onclick="loadOrders()"><i class="fas fa-search"></i> Find Orders</button>
  </div>
  <div id="ordersList"></div>
</div>

<!-- Review Modal -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <button class="btn-close-modal" onclick="closeModal('reviewModal')">&times;</button>
    <h2>Write a Review</h2>
    <input type="hidden" id="reviewOrderId">
    <input type="hidden" id="reviewProductId">
    <input type="hidden" id="reviewCustomerName">
    <div class="form-group">
      <label>Your Rating *</label>
      <div class="stars-input" id="starsInput">
        <span onclick="setRating(1)">★</span>
        <span onclick="setRating(2)">★</span>
        <span onclick="setRating(3)">★</span>
        <span onclick="setRating(4)">★</span>
        <span onclick="setRating(5)">★</span>
      </div>
    </div>
    <div class="form-group">
      <label>Your Review (optional)</label>
      <textarea id="reviewText" rows="3" placeholder="Share your experience..."></textarea>
    </div>
    <button class="btn-submit" onclick="submitReview()"><i class="fas fa-star"></i> Submit Review</button>
  </div>
</div>

<!-- Return Modal -->
<div class="modal-overlay" id="returnModal">
  <div class="modal">
    <button class="btn-close-modal" onclick="closeModal('returnModal')">&times;</button>
    <h2>Request Return / Refund</h2>
    <input type="hidden" id="returnOrderId">
    <div class="form-group">
      <label>Reason *</label>
      <select id="returnReason">
        <option value="">Select a reason</option>
        <option value="damaged">Item arrived damaged</option>
        <option value="wrong_item">Wrong item received</option>
        <option value="not_as_described">Not as described</option>
        <option value="quality">Quality not satisfactory</option>
        <option value="changed_mind">Changed my mind</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="returnDesc" rows="3" placeholder="Please describe the issue in detail..."></textarea>
    </div>
    <button class="btn-submit" onclick="submitReturn()" style="background:#e74c3c"><i class="fas fa-undo"></i> Submit Request</button>
  </div>
</div>

<script>
function enableEnter(inputId, callback) {
  const el = document.getElementById(inputId);
  if (!el) return;
  el.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { callback(); }
  });
}

const SUPABASE_URL = 'https://peqqtfvypljvgcorddbn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlcXF0ZnZ5cGxqdmdjb3JkZGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNDU1OTAsImV4cCI6MjA5NDgyMTU5MH0.J364P7n9HazV0F8Bd9o_OKBsfKbfLAbW1vCRjIflLtE';

let selectedRating = 0;
let currentPhone = '';
let loadedOrders = [];

async function sbFetch(method, table, body, filter) {
  let url = `${SUPABASE_URL}/rest/v1/${table}`;
  if (filter) url += `?${filter}`;
  const res = await fetch(url, {
    method,
    headers: {'apikey': SUPABASE_KEY,'Authorization': `Bearer ${SUPABASE_KEY}`,'Content-Type': 'application/json','Prefer': method === 'POST' ? 'return=representation' : ''},
    body: body ? JSON.stringify(body) : undefined
  });
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadOrders() {
  const phone = document.getElementById('phoneInput').value.trim();
  if (!phone) { alert('Please enter your phone number'); return; }
  const el = document.getElementById('ordersList');
  el.innerHTML = '<div class="empty"><i class="fas fa-spinner fa-spin"></i><p>Loading your orders...</p></div>';
  const clean = phone.replace(/\s/g, '').replace(/^(\+91|91|0)/, '');
  if (!/^[6-9]\d{9}$/.test(clean)) { alert('Please enter a valid 10-digit Indian mobile number.'); return; }
  currentPhone = phone;
  const searchPhone = '+91' + clean;
  const orders1 = await sbFetch('GET', 'orders', null, `customer_phone=eq.${encodeURIComponent(clean)}&order=created_at.desc`);
  const orders2 = await sbFetch('GET', 'orders', null, `customer_phone=eq.${encodeURIComponent(searchPhone)}&order=created_at.desc`);
  const merged = [...(orders1 || []), ...(orders2 || [])];
  const orders = merged.filter((o, i, self) => i === self.findIndex(x => x.id === o.id));
  loadedOrders = orders;
  if (!orders || orders.length === 0) {
    el.innerHTML = '<div class="empty"><i class="fas fa-box-open"></i><p>No orders found for this number.</p><a href="collections.html" style="color:var(--gold);margin-top:1rem;display:inline-block">Start Shopping →</a></div>';
    return;
  }
  const returns1 = await sbFetch('GET', 'returns', null, `customer_phone=eq.${encodeURIComponent(clean)}`);
  const returns2 = await sbFetch('GET', 'returns', null, `customer_phone=eq.${encodeURIComponent(searchPhone)}`);
  const returns = [...(returns1 || []), ...(returns2 || [])];
  const returnedOrderIds = returns ? returns.map(r => r.order_id) : [];
  el.innerHTML = orders.map(o => renderOrder(o, returnedOrderIds)).join('');
}

function getStatusProgress(status) {
  const steps = ['placed','shipping','shipped','delivered'];
  const idx = steps.indexOf(status);
  return idx === -1 ? 0 : idx;
}

function renderOrder(o, returnedOrderIds) {
  const statusColors = {placed:'badge-placed',shipping:'badge-shipping',shipped:'badge-shipped',delivered:'badge-delivered',cancelled:'badge-cancelled'};
  const statusLabels = {placed:'Order Placed',shipping:'Shipping',shipped:'Shipped',delivered:'Delivered',cancelled:'Cancelled'};
  const steps = [
    {key:'placed',icon:'✓',label:'Placed'},
    {key:'shipping',icon:'🚚',label:'Shipping'},
    {key:'shipped',icon:'📦',label:'Shipped'},
    {key:'delivered',icon:'🎁',label:'Delivered'}
  ];
  const progress = getStatusProgress(o.status);
  const isCancelled = o.status === 'cancelled';
  const isDelivered = o.status === 'delivered';
  const hasReturn = returnedOrderIds.includes(o.id);
  const canReturn = isDelivered && !hasReturn;
  const canCancel = o.status === 'placed';
  const canReview = isDelivered;
  const total = Number(o.product_price) * Number(o.quantity);
  const fillPct = isCancelled ? 0 : (progress / (steps.length - 1)) * 100;

  return `
  <div class="order-card">
    <div class="order-header">
      <div>
        <div style="font-weight:600;font-size:0.95rem">Order #${o.id.toString().substring(0,8).toUpperCase()}</div>
        <div class="order-date">${new Date(o.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})} · ${new Date(o.created_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <span class="badge ${statusColors[o.status]||'badge-placed'}">${statusLabels[o.status]||o.status}</span>
    </div>
    <div class="order-body">
      <div class="order-product">
        <div>
          <div class="order-product-name">${o.product_name}</div>
          <div style="font-size:0.8rem;color:var(--muted)">Qty: ${o.quantity} · ${o.payment_method === 'cod' ? 'Cash on Delivery' : 'Online Payment'}</div>
        </div>
        <div class="order-product-price">₹${total.toLocaleString('en-IN')}</div>
      </div>

      ${!isCancelled ? `
      <div class="tracking-bar">
        <div class="tracking-steps">
          <div class="tracking-fill" style="width:${fillPct}%"></div>
          ${steps.map((s,i) => `
          <div class="step">
            <div class="step-dot ${i < progress ? 'done' : i === progress ? 'active' : ''}">${i <= progress ? s.icon : ''}</div>
            <div class="step-label ${i <= progress ? (i < progress ? 'done' : 'active') : ''}">${s.label}</div>
          </div>`).join('')}
        </div>
        ${o.estimated_delivery ? `<div style="font-size:0.78rem;color:var(--muted);text-align:center;margin-top:0.5rem">Estimated delivery: <strong style="color:var(--gold)">${new Date(o.estimated_delivery).toLocaleDateString('en-IN',{day:'numeric',month:'long'})}</strong></div>` : ''}
        ${o.delivered_at ? `<div style="font-size:0.78rem;color:#27ae60;text-align:center;margin-top:0.3rem">✅ Delivered on ${new Date(o.delivered_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>` : ''}
      </div>` : `<div style="background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);padding:0.75rem;font-size:0.85rem;color:#e74c3c;margin:0.8rem 0">❌ This order was cancelled ${o.cancelled_by === 'customer' ? 'by you' : 'by our team'}.</div>`}

      <div class="order-meta">
        ${o.customer_address ? `<span><i class="fas fa-map-marker-alt" style="color:var(--gold)"></i> ${o.customer_address}${o.customer_pincode ? ', '+o.customer_pincode : ''}</span>` : ''}
        ${o.gift_message ? `<span><i class="fas fa-gift" style="color:var(--gold)"></i> "${o.gift_message}"</span>` : ''}
      </div>

      <div class="order-actions">
        ${canCancel ? `<button class="btn-action btn-cancel" onclick="cancelOrder('${o.id}')"><i class="fas fa-times"></i> Cancel Order</button>` : ''}
        ${canReview ? `<button class="btn-action btn-review" onclick="openReview('${o.id}','${o.product_id}','${(o.customer_name || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'")}')"><i class="fas fa-star"></i> Write Review</button>` : ''}
        ${canReturn ? `<button class="btn-action" style="border-color:var(--gold);color:var(--gold)" onclick="openReturn('${o.id}')"><i class="fas fa-undo"></i> Return / Refund</button>` : ''}
        ${hasReturn ? `<span class="badge return-badge"><i class="fas fa-check"></i> Return Requested</span>` : ''}
        <button class="btn-action" onclick="reorder('${o.product_id}')"><i class="fas fa-redo"></i> Reorder</button>
      </div>
    </div>
  </div>`;
}

async function cancelOrder(id) {
  if (!confirm('Are you sure you want to cancel this order?')) return;
  await sbFetch('PATCH', 'orders', {status:'cancelled',cancelled_by:'customer'}, `id=eq.${id}`);
  alert('Order cancelled successfully.');
  loadOrders();
}

function reorder(productId) {
  window.location.href = `collections.html?buyNow=${productId}&autoOrder=1`;
}

function openReview(orderId, productId, customerName) {
  document.getElementById('reviewOrderId').value = orderId;
  document.getElementById('reviewProductId').value = productId;
  // FIX: store the actual customer name so reviews don't show a phone number
  document.getElementById('reviewCustomerName').value = customerName || 'Customer';
  document.getElementById('reviewText').value = '';
  selectedRating = 0;
  setRating(0);
  document.getElementById('reviewModal').classList.add('active');
}

function openReturn(orderId) {
  document.getElementById('returnOrderId').value = orderId;
  document.getElementById('returnReason').value = '';
  document.getElementById('returnDesc').value = '';
  document.getElementById('returnModal').classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

// FIX: Escape key closes review and return modals
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal('reviewModal');
    closeModal('returnModal');
  }
});

function setRating(r) {
  selectedRating = r;
  document.querySelectorAll('#starsInput span').forEach((s,i) => {
    s.classList.toggle('lit', i < r);
  });
}

async function submitReview() {
  if (!selectedRating) { alert('Please select a rating'); return; }
  const phone = document.getElementById('phoneInput').value.trim();
  const clean = phone.replace(/\s/g, '').replace(/^(\+91|91|0)/, '');
  // FIX: use the stored customer name from the order, not the phone number
  const customerName = document.getElementById('reviewCustomerName').value || 'Customer';
  const data = {
    order_id: document.getElementById('reviewOrderId').value,
    product_id: document.getElementById('reviewProductId').value,
    customer_name: customerName,
    customer_phone: '+91' + clean,
    rating: selectedRating,
    review: document.getElementById('reviewText').value.trim() || null
  };
  await sbFetch('POST', 'reviews', data);
  closeModal('reviewModal');
  alert('✅ Thank you for your review!');
  loadOrders();
}

async function submitReturn() {
  const reason = document.getElementById('returnReason').value;
  if (!reason) { alert('Please select a reason'); return; }
  const phone = document.getElementById('phoneInput').value.trim();
  const clean = phone.replace(/\s/g, '').replace(/^(\+91|91|0)/, '');
  const data = {
    order_id: document.getElementById('returnOrderId').value,
    customer_name: 'Customer',
    customer_phone: '+91' + clean,
    reason,
    description: document.getElementById('returnDesc').value.trim() || null,
    status: 'pending'
  };
  await sbFetch('POST', 'returns', data);
  closeModal('returnModal');
  alert('✅ Return request submitted! Our team will contact you within 24 hours.');
  loadOrders();
}

document.getElementById('phoneInput').addEventListener('keypress', e => { if(e.key==='Enter') loadOrders(); });

function setTheme(isLight) {
  document.body.classList.toggle('light-mode', isLight);
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = isLight ? '☀️' : '🌙';
}
function toggleTheme() { setTheme(!document.body.classList.contains('light-mode')); }
function applyTheme() {
  const saved = localStorage.getItem('theme');
  const systemLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  setTheme(saved ? saved === 'light' : systemLight);
}
applyTheme();

const urlParams = new URLSearchParams(window.location.search);
const phone = urlParams.get('phone');
if (phone) { document.getElementById('phoneInput').value = phone; loadOrders(); }
</script>
</body>
</html>
